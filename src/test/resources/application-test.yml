spring:
  datasource:
    url: jdbc:h2:mem:homepage;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  admin:
    username: admin
    password: admin
  upload-dir: ./build/test-uploads
  webdav:
    root-dir: ./build/test-webdav
  rate-limit:
    ip-max-failures: 5
    ip-window-seconds: 60
    user-lockout-threshold: 5
    user-lockout-short-seconds: 300
    user-lockout-long-threshold: 10
    user-lockout-long-seconds: 1800
    max-entries: 10000
    sweep-interval-seconds: 600
