<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status} + ' — Error'">Error</title>
    <link rel="stylesheet" th:href="@{/css/terminal.css}">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-prompt">david@neto:~$</a>
        <ul class="nav-links">
            <li><a href="/">home</a></li>
            <li><a href="/blog">blog</a></li>
        </ul>
    </nav>
    <main class="content" style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
        <div style="text-align: center;">
            <div style="color: var(--accent); font-size: 14px; margin-bottom: 16px;">$ cat /dev/null</div>
            <div style="color: #fff; font-size: 48px; margin-bottom: 8px;" th:text="${status}">404</div>
            <div style="color: var(--text-secondary); font-size: 14px;" th:text="${error}">Not Found</div>
            <div style="margin-top: 24px;">
                <a href="/" style="color: var(--accent); font-size: 13px;">cd ~</a>
            </div>
        </div>
    </main>
    <footer class="footer">
        <span>MIT License</span>
        <span>Built with Spring Boot</span>
    </footer>
</body>
</html>
